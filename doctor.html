<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Doctor | Ritual Teacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Дополнительные стили для соответствия Academy.html */
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
        }
        .card-cyber {
            border: 1px solid #00f3ff;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            border-radius: 15px;
        }
        .btn-cyber-action {
            background: linear-gradient(45deg, #00f3ff, #005f73);
            color: black;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-cyber-action:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px #00f3ff;
        }
        .log-input {
            background: #000 !important;
            color: #00ff41 !important;
            border: 1px solid #333 !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }
        .log-input:focus {
            border-color: #00f3ff !important;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary py-3">
        <div class="container">
            <a class="navbar-brand brand-title" href="index.html">RITUAL TEACHER</a>
            <div class="ms-auto">
                <a href="academy.html" class="btn btn-outline-info btn-sm">Back to Academy</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card card-cyber p-4">
                    <div class="card-body">
                        <h2 class="brand-title text-center mb-2">NODE HEALTH DOCTOR</h2>
                        <p class="text-center text-info small mb-4">DEEP ANALYSIS & REPAIR PROTOCOL</p>
                        
                        <div class="alert alert-dark border-info text-center py-2" style="font-size: 0.85rem;">
                            Diagnostic Fee: <span class="text-info fw-bold">0.002 RTL</span> (or equivalent)
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-secondary small">PASTE YOUR NODE LOGS BELOW:</label>
                            <textarea id="nodeLogs" class="form-control log-input" rows="12" 
                                      placeholder="Example: [ERROR] Failed to connect to p2p network..."></textarea>
                        </div>

                        <button id="payButton" class="btn btn-cyber-action w-100 py-3" onclick="payAndCure()">
                            PAY AND CURE
                        </button>

                        <div id="diagnosisResult" class="mt-5 d-none">
                            <h4 class="brand-title text-warning mb-3" style="font-size: 1.2rem;">DIAGNOSIS REPORT:</h4>
                            <div id="doctorReply" class="p-3 border border-secondary rounded bg-black" style="line-height: 1.6;">
                                </div>
                        </div>
                    </div>
                </div>
                
                <p class="text-center mt-4 text-secondary small" style="opacity: 0.6;">
                    CREATED BY MR LIL POP | RITUAL ECOSYSTEM SUPPORT
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>
        // ЗАМЕНИ НА СВОЙ АДРЕС ДЛЯ ПРИЕМА ОПЛАТЫ
        const RECIPIENT_ADDRESS = "0x5CE75a2486c64dA615fA116B8C53672F0c4A179b"; 

        async function payAndCure() {
            const logs = document.getElementById('nodeLogs').value;
            if (!logs) {
                alert("Please paste your node logs first!");
                return;
            }

            if (typeof window.ethereum === 'undefined') {
                alert("Please install MetaMask to use the Doctor!");
                return;
            }

            try {
                // Подключаем кошелек
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();

                const payButton = document.getElementById('payButton');
                payButton.innerText = "WAITING FOR TRANSACTION...";
                payButton.disabled = true;

                // Отправляем транзакцию
                const tx = {
                    to: RECIPIENT_ADDRESS,
                    value: ethers.utils.parseEther("0.002")
                };

                const transaction = await signer.sendTransaction(tx);
                console.log("Transaction sent:", transaction.hash);

                payButton.innerText = "CONFIRMING ON NETWORK...";
                await transaction.wait(); // Ждем подтверждения

                // Если оплата прошла — вызываем ИИ
                analyzeLogs(logs);

            } catch (error) {
                console.error("Payment failed:", error);
                alert("Transaction failed or canceled.");
                resetButton();
            }
        }

        async function analyzeLogs(logs) {
            const resultDiv = document.getElementById('diagnosisResult');
            const doctorReply = document.getElementById('doctorReply');
            const payButton = document.getElementById('payButton');

            payButton.innerText = "AI DOCTOR IS THINKING...";
            resultDiv.classList.remove('d-none');
            doctorReply.innerHTML = '<span class="text-info">Scanning logs for anomalies...</span>';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: logs, 
                        action: 'doctor' 
                    })
                });

                const data = await response.json();
                
                // Эффект печатающегося текста для ответа
                doctorReply.innerHTML = `<div class="text-success">${data.reply}</div>`;
                payButton.innerText = "TREATMENT COMPLETE";
                
            } catch (err) {
                console.error("AI Error:", err);
                doctorReply.innerHTML = '<span class="text-danger">Error: Could not reach the medical agent.</span>';
                resetButton();
            }
        }

        function resetButton() {
            const payButton = document.getElementById('payButton');
            payButton.innerText = "PAY AND CURE";
            payButton.disabled = false;
        }
    </script>
</body>
</html>
